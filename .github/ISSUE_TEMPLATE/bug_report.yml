name: Bug report
description: Reportar algo que nao funciona como esperado.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descricao
      description: O que aconteceu?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Lista os passos exatos.
      placeholder: |
        1. Abrir...
        2. Escrever...
        3. Ver erro...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado atual
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Ambiente
      placeholder: "Windows 11, Node 22, Chrome"
  - type: textarea
    id: logs
    attributes:
      label: Logs relevantes
      description: Remove chaves de API, tokens e dados privados.
      render: shell
